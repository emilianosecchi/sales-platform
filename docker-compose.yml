services:
  kafka:
    image: confluentinc/cp-kafka:7.8.7
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: "M3UO1Qkj0ysmCHDK2_G9tg"

      # Un único nodo que actúa como broker y controller del cluster
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Una única copia de la metadata, no hay backup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # PLAINTEXT://0.0.0.0:9092 -> Puerto al que se conectan los productores y consumidores
      # CONTROLLER://0.0.0.0:9093 -> Puerto en el que se comunican los brokers/nodos entre sí
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Determina donde se guardan los archivos de datos, logs de los brokers, metadata del controller, etc.
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  kafka_data:
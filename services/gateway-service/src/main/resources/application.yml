server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-auth-service
              uri: lb://user-auth-service
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/